<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lịch Vạn Niên - Tối Ưu iPhone</title>
    <style>
        :root { --primary: #c62828; --secondary: #1565c0; --bg: #f5f6fa; --success: #2e7d32; --lunar-special: #fffde7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .calendar-box { background: #fff; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 18px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }

        .controls { padding: 15px; background: #fff; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 12px; }
        .control-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; text-align: center; background: #f9f9f9; }
        input[type="number"] { width: 80px; font-weight: bold; color: var(--primary); }
        
        button { 
            padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; 
            background: #fff; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            min-width: 45px; transition: background 0.2s;
        }
        button:active { background: #eee; }
        .btn-nav { color: var(--primary); border-color: var(--primary); }
        
        .action-group { display: flex; width: 100%; gap: 10px; }
        .btn-today { background: var(--secondary); color: white; border: none; flex: 1; font-size: 0.9rem; }
        .btn-leap { background: var(--success); color: white; border: none; flex: 1; font-size: 0.9rem; }

        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8f9fa; text-align: center; font-weight: bold; font-size: 0.8rem; padding: 12px 0; color: #666; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .cell { aspect-ratio: 1/1; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Hiệu ứng màu nền cho ngày đặc biệt (1 và 15 âm) */
        .special-bg { background-color: var(--lunar-special) !important; }
        
        .solar { font-size: 1.2rem; font-weight: 600; z-index: 2; }
        .lunar { font-size: 0.75rem; color: #888; margin-top: 3px; z-index: 2; }
        .sun { color: var(--primary); }
        .sat { color: var(--secondary); }
        
        .today { background: #fff5f5; outline: 2px solid var(--primary); z-index: 5; border-radius: 4px; }
        .special-text { color: var(--primary); font-weight: bold; }
        .empty { background: #fafafa; }

        .leap-list { display: none; width: 100%; max-width: 450px; background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-top: 15px; }
        .leap-scroll { max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 1rem; }
        th { position: sticky; top: 0; background: #f8f9fa; }
    </style>
</head>
<body>

<div class="calendar-box">
    <div class="header"><h2 id="monthTitle">THÁNG -- / ----</h2></div>
    
    <div class="controls">
        <div class="control-row">
            <button class="btn-nav" onclick="changeMonth(-1)">❮</button>
            <select id="selMonth" onchange="jump()" style="flex: 1;"></select>
            <button class="btn-nav" onclick="changeMonth(1)">❯</button>
        </div>
        
        <div class="control-row">
            <button class="btn-nav" onclick="changeYear(-1)">-1</button>
            <input type="number" id="inpYear" onchange="jump()">
            <button class="btn-nav" onclick="changeYear(1)">+1</button>
        </div>

        <div class="action-group">
            <button class="btn-today" onclick="goToday()">Hôm nay</button>
            <button class="btn-leap" onclick="toggleLeapList()">Xem năm nhuận</button>
        </div>
    </div>

    <div class="weekdays">
        <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div class="sat">T7</div><div class="sun">CN</div>
    </div>
    <div id="grid" class="days-grid"></div>
</div>

<div id="leapSection" class="leap-list">
    <h3 style="margin-top:0; color: var(--success);">Năm nhuận (1950 - 2080)</h3>
    <div class="leap-scroll">
        <table id="leapTable"><thead><tr><th>Năm Âm</th><th>Tháng nhuận</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
const LEAP_DATA = {
    1950:3, 1952:8, 1955:3, 1957:8, 1960:6, 1963:4, 1966:3, 1968:7, 1971:5, 1974:4, 1976:8, 1979:6, 1982:4, 1984:10, 1987:6,
    1990:5, 1993:3, 1995:8, 1998:5, 2001:4, 2004:2, 2006:7, 2009:5, 2012:4, 2014:9, 2017:6, 2020:4, 2023:2, 2025:6, 2028:5, 2031:3, 2033:11, 2036:6, 2039:5, 2042:2, 2044:9, 2047:5,
    2050:3, 2052:8, 2055:6, 2058:4, 2061:3, 2063:7, 2066:5, 2069:4, 2072:2, 2074:6, 2077:5, 2080:3
};

function getNewMoon(k) {
    let T = k / 1236.85;
    let JDN = 2451550.09766 + 29.530588861 * k + 0.0001337 * T * T;
    let dr = Math.PI / 180;
    let M = (2.5534 + 29.10535670 * k) * dr, Mpr = (201.5643 + 385.81693528 * k) * dr;
    let F = (160.7108 + 390.67050284 * k) * dr, E = 1 - 0.002516 * T;
    let delta = -0.4072 * Math.sin(Mpr) + 0.1724 * E * Math.sin(M) + 0.0161 * Math.sin(2 * Mpr) + 0.0104 * Math.sin(2 * F);
    return JDN + delta + 7/24; 
}

function getJD(d, m, y) {
    if (m <= 2) { y -= 1; m += 12; }
    let a = Math.floor(y / 100), b = 2 - a + Math.floor(a / 4);
    return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + b - 1524.5;
}

function getLunarDate(d, m, y) {
    const jd = Math.floor(getJD(d, m, y) + 0.5);
    let k = Math.floor((y + (m - 1) / 12 - 2000) * 12.3685);
    let nm = Math.floor(getNewMoon(k) + 0.5);
    while (nm > jd) { k--; nm = Math.floor(getNewMoon(k) + 0.5); }
    let next_nm = Math.floor(getNewMoon(k + 1) + 0.5);
    while (jd >= next_nm) { k++; nm = next_nm; next_nm = Math.floor(getNewMoon(k + 1) + 0.5); }
    let currentK = 298, lYear = 2024, lMonth = 1, isLeap = false;
    if (k > currentK) {
        while (currentK < k) {
            currentK++;
            if (isLeap) { lMonth++; isLeap = false; if (lMonth > 12) { lMonth = 1; lYear++; } } 
            else {
                if (LEAP_DATA[lYear] === lMonth) isLeap = true;
                else { lMonth++; if (lMonth > 12) { lMonth = 1; lYear++; } }
            }
        }
    } else if (k < currentK) {
        while (currentK > k) {
            currentK--;
            if (isLeap) isLeap = false;
            else {
                lMonth--; if (lMonth < 1) { lYear--; lMonth = 12; }
                if (LEAP_DATA[lYear] === lMonth) isLeap = true;
            }
        }
    }
    return { ld: jd - nm + 1, lm: lMonth, isLeap: isLeap };
}

let viewDate = new Date();

function render() {
    const grid = document.getElementById('grid');
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    document.getElementById('monthTitle').innerText = `THÁNG ${m+1} / ${y}`;
    document.getElementById('selMonth').value = m;
    document.getElementById('inpYear').value = y;
    grid.innerHTML = '';
    let firstDay = new Date(y, m, 1).getDay();
    let offset = (firstDay === 0) ? 6 : firstDay - 1;
    for (let i = 0; i < offset; i++) grid.innerHTML += '<div class="cell empty"></div>';
    
    for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
        const dateObj = new Date(y, m, d), dow = dateObj.getDay();
        const lun = getLunarDate(d, m + 1, y);
        const isToday = d === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear();
        
        // Kiểm tra ngày đặc biệt (1 và 15 âm lịch)
        const isSpecialDay = (lun.ld === 1 || lun.ld === 15);
        
        let lunarTxt = lun.ld === 1 ? `${lun.ld}/${lun.lm}${lun.isLeap?'n':''}` : lun.ld;
        
        grid.innerHTML += `<div class="cell ${isToday ? 'today' : ''} ${isSpecialDay ? 'special-bg' : ''}">
            <div class="solar ${dow==0?'sun':(dow==6?'sat':'')}">${d}</div>
            <div class="lunar ${lun.ld==1||lun.ld==15?'special-text':''}">${lunarTxt}</div>
        </div>`;
    }
}

function init() {
    const sel = document.getElementById('selMonth');
    const months = ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"];
    months.forEach((name, i) => { let opt = new Option(name, i); sel.add(opt); });
    render();
}
function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }
function changeYear(n) { viewDate.setFullYear(viewDate.getFullYear() + n); render(); }
function jump() { viewDate = new Date(document.getElementById('inpYear').value, document.getElementById('selMonth').value, 1); render(); }
function goToday() { viewDate = new Date(); render(); }
function toggleLeapList() {
    const sec = document.getElementById('leapSection');
    if (sec.style.display === 'block') { sec.style.display = 'none'; return; }
    const tbody = document.querySelector('#leapTable tbody');
    tbody.innerHTML = '';
    Object.keys(LEAP_DATA).sort().forEach(yr => {
        tbody.innerHTML += `<tr><td>Năm ${yr}</td><td>Tháng ${LEAP_DATA[yr]}</td></tr>`;
    });
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth' });
}
init();
</script>
</body>
</html>
